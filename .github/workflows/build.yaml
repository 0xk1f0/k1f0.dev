name: Build, Publish and Deploy Latest Image

on:
  push:
    branches: ["master"]
    paths:
      - ".github/workflows/**"
      - "public/**"
      - "src/**"
      - "astro.conf.ts"
      - "tsconfig.json"
      - "package.json"
      - "bun.lock"
      - "Containerfile"
  pull_request:
    branches: ["master"]
    paths:
      - ".github/workflows/**"
      - "public/**"
      - "src/**"
      - "astro.conf.ts"
      - "tsconfig.json"
      - "package.json"
      - "bun.lock"
      - "Containerfile"

jobs:
  build-publish-deploy:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Build Image
        id: buildah
        uses: redhat-actions/buildah-build@v2
        with:
          image: ${{ github.repository }}
          tags: latest
          context: ./
          containerfiles: |
            ./Containerfile
      - name: Push to GHCR
        if: ${{ github.event_name != 'pull_request' }}
        uses: redhat-actions/push-to-registry@v2
        with:
          image: ${{ steps.buildah.outputs.image }}
          tags: ${{ steps.buildah.outputs.tags }}
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Trigger Flux Reconcile
        env:
          FLUX_WEBHOOK_TOKEN: ${{ secrets.FLUX_WEBHOOK_TOKEN }}
          FLUX_WEBHOOK_URL: ${{ secrets.FLUX_WEBHOOK_URL }}
        run: |
          BODY='{"deployment":"k1f0-dev","namespace":"k1f0-dev"}'
          SIGNATURE=$(printf '%s' "${BODY}" | openssl dgst -sha256 -hmac "${FLUX_WEBHOOK_TOKEN}" -hex | sed 's/^.* //')

          curl -fsSL -X POST \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: sha256=${SIGNATURE}" \
            -d "${BODY}" \
            "${FLUX_WEBHOOK_URL}"
      - name: Cleanup registry
        if: ${{ github.event_name != 'pull_request' }}
        uses: actions/delete-package-versions@v5
        with:
          package-name: k1f0.dev
          package-type: container
          min-versions-to-keep: 3
